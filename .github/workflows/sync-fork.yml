name: Upstream Sync

on:
  schedule:
    - cron: "0 7 * * *"
  # scheduled at 07:00 every day

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check for new upstream commits
        id: check
        run: |
          git remote add upstream https://github.com/immich-app/immich.git
          git fetch upstream main
          NEW_COMMITS=$(git rev-list HEAD..upstream/main --count)
          echo "new_commits=$NEW_COMMITS" >> "$GITHUB_OUTPUT"
          if [ "$NEW_COMMITS" -gt 0 ]; then
            echo "Found $NEW_COMMITS new upstream commits"
          else
            echo "No new upstream commits"
          fi

      - name: Create or update sync branch and PR
        if: steps.check.outputs.new_commits > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="upstream-sync"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create/update the sync branch pointing to upstream/main
          git checkout -B "$SYNC_BRANCH" upstream/main
          git push origin "$SYNC_BRANCH" --force

          # Check if a sync PR already exists
          EXISTING_PR=$(gh pr list --head "$SYNC_BRANCH" --base main --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "Sync PR #$EXISTING_PR already exists, updated branch"
            exit 0
          fi

          # Create the PR
          gh pr create \
            --title "sync: merge upstream immich-app/immich" \
            --body "Automated PR to sync with upstream immich-app/immich.

          **${{ steps.check.outputs.new_commits }}** new commits from upstream.

          > Created automatically by the Upstream Sync workflow." \
            --head "$SYNC_BRANCH" \
            --base main
