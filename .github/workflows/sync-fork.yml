name: Upstream Sync

on:
  schedule:
    - cron: "0 7 * * *"
  # scheduled at 07:00 every day

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check for new upstream commits
        id: check
        run: |
          git remote add upstream https://github.com/immich-app/immich.git
          git fetch upstream main
          NEW_COMMITS=$(git rev-list HEAD..upstream/main --count)
          echo "new_commits=$NEW_COMMITS" >> "$GITHUB_OUTPUT"
          if [ "$NEW_COMMITS" -gt 0 ]; then
            echo "Found $NEW_COMMITS new upstream commits"
          else
            echo "No new upstream commits"
          fi

      - name: Create or update sync branch and PR
        if: steps.check.outputs.new_commits > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="upstream-sync"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create/update the sync branch pointing to upstream/main
          git checkout -B "$SYNC_BRANCH" upstream/main

          # Replace upstream workflows with our fork's — upstream workflows
          # are not relevant and GITHUB_TOKEN can't push workflow changes anyway
          git rm -rf --quiet .github/workflows/
          git checkout origin/main -- .github/workflows/
          if ! git diff --cached --quiet; then
            git commit -m "chore: preserve fork workflow files"
          fi

          git push origin "$SYNC_BRANCH" --force

          # Check if a sync PR already exists (use REST API — GraphQL is
          # restricted on forked repos even with correct permissions)
          EXISTING_PR=$(gh api repos/${{ github.repository }}/pulls \
            --jq ".[] | select(.head.ref==\"$SYNC_BRANCH\" and .state==\"open\") | .number" \
            2>/dev/null | head -1)
          if [ -n "$EXISTING_PR" ]; then
            echo "Sync PR #$EXISTING_PR already exists, updated branch"
            exit 0
          fi

          # Create the PR via REST API
          gh api repos/${{ github.repository }}/pulls \
            -f title="sync: merge upstream immich-app/immich" \
            -f body="Automated PR to sync with upstream immich-app/immich.

          **${{ steps.check.outputs.new_commits }}** new commits from upstream.

          > Created automatically by the Upstream Sync workflow." \
            -f head="$SYNC_BRANCH" \
            -f base="main"
